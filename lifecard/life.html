  var emptyEmoji = isSpill ? '\ud83e\udee6' : '\u2615';
  var emptyTitle = isSpill ? 'Nothing to spill... yet.' : 'No tea to spill... yet.';
  content.innerHTML = '<div class="empty"><div class="empty-emoji">' + emptyEmoji + '</div><div class="empty-title">' + emptyTitle + '</div><div class="empty-desc">Add URL parameters to see your card.</div></div>';
} else {
  var html = '';
  if (isSpill) {
    html += '<div class="card-emoji">\ud83e\udee6</div>';
    html += '<div class="card-subtitle" style="color:#D4728C">for your eyes only</div>';
    html += '<div class="card-title" style="color:#D4728C">The Spill</div>';
  } else {
    html += '<div class="card-emoji">\u2615</div>';
    html += '<div class="card-subtitle">your data has opinions</div>';
    html += '<div class="card-title">The Tea</div>';
  }

  if (isTea) {
    if (teaMood) { html += '<div class="tea-row"><div class="tea-label">Mood</div><div class="tea-text">' + escHtml(teaMood) + '</div>'; if (mood) html += '<div class="tea-meta">mood avg: ' + mood.toFixed(1) + ' this week</div>'; html += '</div>'; }
    if (teaPhase && phase) { html += '<div class="tea-row ' + phaseClass + '"><div class="tea-label">Cycle &middot; ' + escHtml(phaseSeason[phase] || phase) + '</div><div class="tea-text">' + escHtml(teaPhase) + '</div><div class="tea-meta">phase: ' + escHtml(phase) + '</div></div>'; }
    if (teaHabits) { html += '<div class="tea-row"><div class="tea-label">Habits</div><div class="tea-text">' + escHtml(teaHabits) + '</div>'; if (habits) html += '<div class="tea-meta">habit avg: ' + habits.toFixed(1) + ' this week</div>'; html += '</div>'; }
    html += '<div class="delta-row ' + deltaClass + '"><div class="tea-label">Plot Twist</div><div class="tea-text"><span class="delta-icon">' + deltaIcon + '</span>' + escHtml(deltaText) + '</div></div>';
    html += '<div class="chaos-section"><div class="chaos-label">chaos level</div><div class="chaos-meter">' + (chaosEmoji[chaos] || '\u2615\u2615\u2615') + '</div><div class="chaos-verdict">' + (chaosVerdict[chaos] || 'calculating...') + '</div><div class="hashtags">#ShesThatGirl #TheReceipts #' + escHtml(persona) + '</div></div>';
  }

  if (isSpill) {
    var spicyTier = connectionCount >= 6 ? 'high' : connectionCount >= 2 ? 'medium' : 'low';
    var spicyChapter = (chapter === 'committed' || chapter === 'casual' || chapter === 'solo') ? chapter : 'solo';
    var spicyPool = SPICY[spicyChapter][spicyTier];
    var spicyText = teaSpicy || spicyPool[Math.floor(new Date().getMinutes() % spicyPool.length)];
    html += '<div class="tea-row" style="border-color:rgba(212,114,140,.25);background:rgba(212,114,140,.04)"><div class="tea-label" style="color:rgba(212,114,140,.5)">Connection ' + (chapter ? '&middot; ' + escHtml(chapter) : '') + '</div><div class="tea-text">' + escHtml(spicyText) + '</div>';
    if (connectionCount) html += '<div class="tea-meta">' + connectionCount + ' moments this month</div>';
    html += '</div>';
    if (phase) {
      var phaseSpill = {Menstrual:'resting season. the body knows. \ud83e\udeb7\ud83e\udd7a',Follicular:'energy rising. the build-up begins. \ud83c\udf38\ud83d\ude0f\ud83d\udd25',Ovulatory:'peak energy. everything is heightened. \ud83e\udd75\ud83e\udee6\ud83d\udc40',Luteal:'nesting mode. selective energy. \ud83c\udf51\ud83d\ude08'};
      html += '<div class="tea-row ' + phaseClass + '"><div class="tea-label" style="color:rgba(212,114,140,.4)">Cycle &middot; ' + escHtml(phaseSeason[phase] || phase) + '</div><div class="tea-text">' + (phaseSpill[phase] || '') + '</div></div>';
    }
    html += '<div class="chaos-section"><div class="chaos-label" style="color:rgba(212,114,140,.4)">spice level</div><div class="chaos-meter">' + (spiceMeter[spiceLevel] || '\ud83e\udee6\ud83e\udee6\ud83e\udee6') + '</div><div class="chaos-verdict" style="color:#D4728C">' + (spiceVerdict[spiceLevel] || '') + '</div>';
    html += '<div class="hashtags" style="color:rgba(212,114,140,.2)">#ShesThatGirl #TheSpill' + (isSpillFree ? '' : ' #' + escHtml(persona)) + '</div></div>';
  }

  html += '<div class="watermark">SHE\'S THAT GIRL &middot; ' + (isSpill ? 'THE SPILL' : 'THE TEA') + '</div>';

  if (isMobile) html += '<div class="share-hint">share your tea</div>';
  else if (isDesktop) html += '<div class="share-hint">open on your phone for the perfect screenshot</div>';

  content.innerHTML = html;
}

function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ═══════════════════════════════════════════════════════
// SHARE — single button (mobile) + long-press fallback
// ═══════════════════════════════════════════════════════
if (hasData) {
  var btnClass = isSpill ? 'share-btn spill' : 'share-btn';
  var shareHtml = '<div class="share-bar">';
  shareHtml += '<button class="' + btnClass + '" id="btnShare">Share</button>';
  shareHtml += '</div>';
  shareHtml += '<div class="share-status" id="shareStatus"></div>';
  shareHtml += '<div id="fallbackContainer"></div>';
  content.insertAdjacentHTML('beforeend', shareHtml);
}
</script>

<!-- html-to-image -->
<script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js"></script>

<script>
(function() {
  var card = document.getElementById('card');
  var status = document.getElementById('shareStatus');
  var btnShare = document.getElementById('btnShare');
  var fallbackContainer = document.getElementById('fallbackContainer');
  if (!card || !btnShare) return;

  var isMobileDevice = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  var isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

  function setStatus(msg) {
    if (status) { status.textContent = msg; setTimeout(function(){ status.textContent = ''; }, 4000); }
  }

  function captureCard() {
    setStatus('Rendering...');
    var hide = ['.share-bar', '.share-status', '.share-hint', '#fallbackContainer'];
    hide.forEach(function(s) { var el = document.querySelector(s); if (el) el.style.display = 'none'; });
    return htmlToImage.toBlob(card, {
      pixelRatio: 3, backgroundColor: '#0a0a0a',
      width: card.scrollWidth, height: card.scrollHeight,
      style: { borderRadius: '0' }
    }).finally(function() {
      hide.forEach(function(s) { var el = document.querySelector(s); if (el) el.style.display = ''; });
    });
  }

  function showFallbackImage(blob) {
    if (!fallbackContainer) return;
    var url = URL.createObjectURL(blob);
    fallbackContainer.innerHTML =
      '<img src="' + url + '" class="fallback-img" alt="Tea Card">' +
      '<div style="text-align:center;font-size:.45rem;color:rgba(255,255,255,.15);margin-top:.25rem">Long-press image to save</div>';
  }

  btnShare.addEventListener('click', function() {
    captureCard().then(function(blob) {
      var file = new File([blob], 'the-tea-card.png', { type: 'image/png' });

      // navigator.share with files — iOS: files only (title/text breaks it)
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        return navigator.share({ files: [file] }).then(function() {
          setStatus('Shared!');
        });
      }

      // Fallback: share URL only
      if (navigator.share) {
        return navigator.share({ url: window.location.href }).then(function() {
          setStatus('Link shared!');
        });
      }

      // No share API: show long-press image
      showFallbackImage(blob);
      setStatus('Long-press the image to save');
    }).catch(function(err) {
      if (err.name === 'AbortError') return;
      // Share failed: show long-press fallback
      captureCard().then(showFallbackImage);
      setStatus('Long-press the image to save');
    });
  });
})();
</script>
