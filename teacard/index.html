body{font-family:'Segoe UI',-apple-system,system-ui,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.card{width:100%;max-width:100vw;min-height:100vh;position:relative;display:flex;flex-direction:column;overflow:hidden}
.card-bg{position:absolute;inset:0;z-index:0;background:#1C1520}
.card-overlay{position:absolute;inset:0;z-index:1}

.card-emoji{text-align:center;font-size:2.8rem;margin-bottom:.2rem}
.card-subtitle{text-align:center;font-size:.6rem;letter-spacing:3px;color:#ffd700;font-weight:800;text-transform:uppercase;margin-bottom:.15rem}
.card-title{text-align:center;font-size:1.4rem;font-weight:800;color:#ffd700;margin-bottom:1.2rem;line-height:1.3}
.tea-row{background:rgba(255,215,0,.04);border:1px solid rgba(255,215,0,.1);border-radius:12px;padding:.7rem .9rem;margin-bottom:.55rem}
.tea-label{font-size:.55rem;letter-spacing:1.5px;color:rgba(255,255,255,.3);text-transform:uppercase;font-weight:700;margin-bottom:.2rem}
.tea-text{font-size:.95rem;font-weight:600;color:rgba(255,255,255,.92);line-height:1.4}
.tea-meta{font-size:.65rem;color:rgba(255,255,255,.35);margin-top:.15rem}
.verdict-row{background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.18);border-radius:12px;padding:.8rem .9rem;margin-bottom:.55rem;text-align:center}
.verdict-label{font-size:.45rem;letter-spacing:2px;color:rgba(255,215,0,.5);text-transform:uppercase;font-weight:700;margin-bottom:.3rem}
.verdict-text{font-size:1rem;font-weight:700;color:#ffd700;line-height:1.4;font-style:italic}
.chaos-section{text-align:center;margin:.8rem 0 .3rem;flex-shrink:0}
.chaos-label{font-size:.5rem;letter-spacing:2px;color:rgba(255,255,255,.25);text-transform:uppercase;font-weight:700}
.chaos-meter{font-size:1.3rem;margin:.25rem 0}
.chaos-verdict{font-size:.68rem;color:#ffd700;font-weight:700}
.hashtags{text-align:center;font-size:.6rem;color:rgba(255,215,0,.2);margin-top:.35rem}
.watermark{text-align:center;font-size:.48rem;color:rgba(255,255,255,.08);margin-top:.6rem;letter-spacing:1px}
.share-bar{display:flex;gap:10px;justify-content:center;margin-top:1rem;padding:.5rem 0}
.share-btn{background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.2);color:#ffd700;font-size:.75rem;font-weight:700;padding:.6rem 1.4rem;border-radius:12px;cursor:pointer;letter-spacing:.3px;display:flex;align-items:center;gap:6px;transition:all .15s;-webkit-tap-highlight-color:transparent}
.share-btn:active{transform:scale(.95);background:rgba(255,215,0,.2)}
.share-status{text-align:center;font-size:.55rem;color:rgba(255,215,0,.4);margin-top:.4rem;min-height:1.2em}
.share-hint{text-align:center;font-size:.5rem;color:rgba(255,215,0,.12);margin-top:auto;padding-top:.5rem;letter-spacing:.5px}
.fallback-img{width:100%;border-radius:12px;margin-top:.5rem;-webkit-touch-callout:default;-webkit-user-select:auto;user-select:auto}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:2rem}
.empty-emoji{font-size:3rem;margin-bottom:.8rem;opacity:.4}
.empty-title{font-size:1.1rem;font-weight:700;color:rgba(255,215,0,.6);margin-bottom:.5rem}
.empty-desc{font-size:.75rem;color:rgba(255,255,255,.2);line-height:1.6;max-width:260px}
.drm-wm{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.85);pointer-events:none}
.drm-wm span{color:rgba(255,0,0,.6);font-size:2rem;font-weight:900;transform:rotate(-30deg);letter-spacing:4px;text-transform:uppercase}
@media(min-width:768px){
  body{background:#0a0a0a;overflow:hidden}
  .card{max-width:100vw;min-height:100vh}
  .card-content{max-width:680px;margin:0 auto;padding:3rem 2.5rem;justify-content:center}
  .card-emoji{font-size:4rem;margin-bottom:.4rem}
  .card-subtitle{font-size:.75rem;letter-spacing:5px;margin-bottom:.25rem}
  .card-title{font-size:2rem;margin-bottom:1.8rem}
  .tea-row{padding:1rem 1.3rem;margin-bottom:.7rem;border-radius:14px}
  .tea-label{font-size:.65rem;letter-spacing:2px;margin-bottom:.3rem}
  .tea-text{font-size:1.15rem;line-height:1.5}
  .tea-meta{font-size:.75rem}
  .verdict-row{padding:1rem 1.3rem;border-radius:14px}
  .verdict-text{font-size:1.2rem}
  .chaos-meter{font-size:1.8rem}
  .share-hint{font-size:.6rem}
}
</style>

  document.getElementById('cardOverlay').style.background='linear-gradient('+ang2+'deg,rgba(28,21,32,'+(op[energy]-.18)+') 0%,rgba(28,21,32,'+op[energy]+') 40%,rgba(28,21,32,'+(op[energy]+.02)+') 100%)';

  // Chaos from energy + spend combined
  var chaos=Math.min(5,Math.max(1,Math.round((energy+spend/200))));
  var cEmoji={1:'\uD83E\uDEB7',2:'\u2615\u2615',3:'\u2615\u2615\u2615',4:'\uD83D\uDD25\uD83D\uDD25\uD83D\uDD25\uD83D\uDD25',5:'\uD83D\uDD25\uD83D\uDD25\uD83D\uDD25\uD83D\uDD25\uD83E\uDEE0'};
  var cVerdict={1:'Calm Tea',2:'Lukewarm Brew',3:'The Tea Is Served',4:'Scalding Hot Tea',5:'The Tea Is on FIRE'};

  var h='';
  h+='<div class="card-emoji">\u2615</div>';
  h+='<div class="card-subtitle">student os beta \u00B7 the tea</div>';
  h+='<div class="card-title">'+esc(title[0])+'</div>';

  // THE STATE
  h+='<div class="tea-row"><div class="tea-label">The State</div>';
  h+='<div class="tea-text">'+esc(title[1])+'</div>';
  h+='<div class="tea-meta">'+(_me[mood]||'')+' '+esc(mood)+' \u00B7 '+esc(mental)+'</div></div>';

  // THE RECEIPTS
  h+='<div class="tea-row"><div class="tea-label">The Receipts'+(topCat!=='none'?' \u00B7 '+esc(topCat):'')+'</div>';
  h+='<div class="tea-text">'+esc(receipt)+'</div></div>';

  // THE VERDICT
  h+='<div class="verdict-row"><div class="verdict-label">The Verdict</div>';
  h+='<div class="verdict-text">'+esc(verdict)+'</div></div>';

  // Chaos
  h+='<div class="chaos-section"><div class="chaos-label">tea temperature</div>';
  h+='<div class="chaos-meter">'+(cEmoji[chaos]||'\u2615\u2615\u2615')+'</div>';
  h+='<div class="chaos-verdict">'+(cVerdict[chaos]||'')+'</div>';
  h+='<div class="hashtags">#StudentOS #TheTea #'+esc(mood)+esc(mental)+'</div></div>';

  h+='<div class="watermark">STUDENT OS BETA &middot; THE TEA</div>';
  h+='<div class="share-bar"><button class="share-btn" id="btnShare">Share</button></div>';
  h+='<div class="share-status" id="shareStatus"></div>';
  h+='<div id="fallbackContainer"></div>';
  if(isMobile)h+='<div class="share-hint">Spill the Tea</div>';
  else h+='<div class="share-hint">Use directly on your phone</div>';
  content.innerHTML=h;
}
</script>
<script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js"></script>
<script>
(function(){var card=document.getElementById('card'),btn=document.getElementById('btnShare'),st=document.getElementById('shareStatus'),fb=document.getElementById('fallbackContainer');if(!card||!btn)return;function ss(m){if(st){st.textContent=m;setTimeout(function(){st.textContent='';},4000);}}function cap(){ss('Rendering...');var h=['.share-bar','.share-status','.share-hint','#fallbackContainer'];h.forEach(function(s){var e=document.querySelector(s);if(e)e.style.display='none';});return htmlToImage.toBlob(card,{pixelRatio:3,backgroundColor:'#0a0a0a',width:card.scrollWidth,height:card.scrollHeight,style:{borderRadius:'0'}}).finally(function(){h.forEach(function(s){var e=document.querySelector(s);if(e)e.style.display='';});});}btn.addEventListener('click',function(){cap().then(function(b){var f=new File([b],'the-tea.png',{type:'image/png'});if(navigator.canShare&&navigator.canShare({files:[f]}))return navigator.share({files:[f]}).then(function(){ss('Tea spilled!');});if(navigator.share)return navigator.share({url:location.href}).then(function(){ss('Link shared!');});var u=URL.createObjectURL(b);fb.innerHTML='<img src="'+u+'" class="fallback-img"><div style="text-align:center;font-size:.4rem;color:rgba(255,255,255,.1);margin-top:.2rem">Long-press to save</div>';ss('Long-press the image to save');}).catch(function(e){if(e.name==='AbortError')return;cap().then(function(b){fb.innerHTML='<img src="'+URL.createObjectURL(b)+'" class="fallback-img">';ss('Long-press to save');});});});})();
</script>
