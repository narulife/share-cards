<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none}
body{font-family:'Segoe UI',-apple-system,system-ui,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.card{width:100%;max-width:100vw;min-height:100vh;position:relative;display:flex;flex-direction:column;overflow:hidden}
.card-bg{position:absolute;inset:0;z-index:0}
.card-overlay{position:absolute;inset:0;z-index:1}
.card-content{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;padding:2.5rem 1.5rem 1.5rem;justify-content:center}
.card-emoji{text-align:center;font-size:2.8rem;margin-bottom:.2rem}
.card-subtitle{text-align:center;font-size:.6rem;letter-spacing:3px;color:#B388FF;font-weight:800;text-transform:uppercase;margin-bottom:.15rem}
.card-title{text-align:center;font-size:1.5rem;font-weight:800;color:#B388FF;margin-bottom:.3rem;line-height:1.3}
.card-rank{text-align:center;font-size:.7rem;color:rgba(255,255,255,.45);font-weight:600;margin-bottom:1.2rem}
.tea-row{background:rgba(179,136,255,.04);border:1px solid rgba(179,136,255,.1);border-radius:12px;padding:.7rem .9rem;margin-bottom:.55rem}
.tea-label{font-size:.55rem;letter-spacing:1.5px;color:rgba(255,255,255,.3);text-transform:uppercase;font-weight:700;margin-bottom:.2rem}
.tea-text{font-size:.95rem;font-weight:600;color:rgba(255,255,255,.92);line-height:1.4}
.tea-meta{font-size:.65rem;color:rgba(255,255,255,.35);margin-top:.15rem}
.xp-bar{width:100%;height:6px;background:rgba(179,136,255,.1);border-radius:3px;margin-top:.4rem;overflow:hidden}
.xp-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#B388FF,#7C4DFF);transition:width .5s}
.wotd-row{background:rgba(179,136,255,.08);border:1px solid rgba(179,136,255,.18);border-radius:12px;padding:.7rem .9rem;margin-bottom:.55rem;text-align:center}
.wotd-label{font-size:.45rem;letter-spacing:2px;color:rgba(179,136,255,.5);text-transform:uppercase;font-weight:700;margin-bottom:.3rem}
.wotd-word{font-size:1.4rem;font-weight:800;color:#B388FF;letter-spacing:1px;text-transform:lowercase}
.chaos-section{text-align:center;margin:.8rem 0 .3rem;flex-shrink:0}
.chaos-label{font-size:.5rem;letter-spacing:2px;color:rgba(255,255,255,.25);text-transform:uppercase;font-weight:700}
.chaos-meter{font-size:1.3rem;margin:.25rem 0}
.chaos-verdict{font-size:.68rem;color:#B388FF;font-weight:700}
.hashtags{text-align:center;font-size:.6rem;color:rgba(179,136,255,.2);margin-top:.35rem}
.watermark{text-align:center;font-size:.48rem;color:rgba(255,255,255,.08);margin-top:.6rem;letter-spacing:1px}
.share-bar{display:flex;gap:10px;justify-content:center;margin-top:1rem;padding:.5rem 0}
.share-btn{background:rgba(179,136,255,.1);border:1px solid rgba(179,136,255,.2);color:#B388FF;font-size:.75rem;font-weight:700;padding:.6rem 1.4rem;border-radius:12px;cursor:pointer;letter-spacing:.3px;display:flex;align-items:center;gap:6px;transition:all .15s;-webkit-tap-highlight-color:transparent}
.share-btn:active{transform:scale(.95);background:rgba(179,136,255,.2)}
.share-status{text-align:center;font-size:.55rem;color:rgba(179,136,255,.4);margin-top:.4rem;min-height:1.2em}
.share-hint{text-align:center;font-size:.5rem;color:rgba(179,136,255,.12);margin-top:auto;padding-top:.5rem;letter-spacing:.5px}
.fallback-img{width:100%;border-radius:12px;margin-top:.5rem;-webkit-touch-callout:default;-webkit-user-select:auto;user-select:auto}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:2rem}
.empty-emoji{font-size:3rem;margin-bottom:.8rem;opacity:.4}
.empty-title{font-size:1.1rem;font-weight:700;color:rgba(179,136,255,.6);margin-bottom:.5rem}
.empty-desc{font-size:.75rem;color:rgba(255,255,255,.2);line-height:1.6;max-width:260px}
.drm-wm{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.85);pointer-events:none}
.drm-wm span{color:rgba(255,0,0,.6);font-size:2rem;font-weight:900;transform:rotate(-30deg);letter-spacing:4px;text-transform:uppercase}
.card-bg{background:#0D0B1A}
@media(min-width:768px){
  body{background:#0a0a0a;overflow:hidden}
  .card{max-width:100vw;min-height:100vh}
  .card-content{max-width:680px;margin:0 auto;padding:3rem 2.5rem;justify-content:center}
  .card-emoji{font-size:4rem;margin-bottom:.4rem}
  .card-subtitle{font-size:.75rem;letter-spacing:5px;margin-bottom:.25rem}
  .card-title{font-size:2.2rem;margin-bottom:.4rem}
  .card-rank{font-size:.85rem;margin-bottom:1.8rem}
  .tea-row{padding:1rem 1.3rem;margin-bottom:.7rem;border-radius:14px}
  .tea-label{font-size:.65rem;letter-spacing:2px;margin-bottom:.3rem}
  .tea-text{font-size:1.2rem;line-height:1.5}
  .tea-meta{font-size:.75rem;margin-top:.2rem}
  .wotd-row{padding:1rem 1.3rem;border-radius:14px}
  .wotd-word{font-size:1.8rem}
  .chaos-meter{font-size:1.8rem}
  .share-hint{font-size:.6rem}
}
</style>

<script>
(function(){var card=document.getElementById('card'),btn=document.getElementById('btnShare'),st=document.getElementById('shareStatus'),fb=document.getElementById('fallbackContainer');if(!card||!btn)return;function ss(m){if(st){st.textContent=m;setTimeout(function(){st.textContent='';},4000);}}function cap(){ss('Rendering...');var h=['.share-bar','.share-status','.share-hint','#fallbackContainer'];h.forEach(function(s){var e=document.querySelector(s);if(e)e.style.display='none';});return htmlToImage.toBlob(card,{pixelRatio:3,backgroundColor:'#0a0a0a',width:card.scrollWidth,height:card.scrollHeight,style:{borderRadius:'0'}}).finally(function(){h.forEach(function(s){var e=document.querySelector(s);if(e)e.style.display='';});});}btn.addEventListener('click',function(){cap().then(function(b){var f=new File([b],'xp-card.png',{type:'image/png'});if(navigator.canShare&&navigator.canShare({files:[f]}))return navigator.share({files:[f]}).then(function(){ss('Shared!');});if(navigator.share)return navigator.share({url:location.href}).then(function(){ss('Link shared!');});var u=URL.createObjectURL(b);fb.innerHTML='<img src="'+u+'" class="fallback-img"><div style="text-align:center;font-size:.4rem;color:rgba(255,255,255,.1);margin-top:.2rem">Long-press to save</div>';ss('Long-press the image to save');}).catch(function(e){if(e.name==='AbortError')return;cap().then(function(b){fb.innerHTML='<img src="'+URL.createObjectURL(b)+'" class="fallback-img">';ss('Long-press to save');});});});})();
</script>
</body>
</html>
